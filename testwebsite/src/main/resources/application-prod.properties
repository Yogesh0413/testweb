# ?????????????????????????????????????????
# application-prod.properties
# Used by Render. Never commit secrets here
# ? values are injected as env variables.
# ?????????????????????????????????????????

# Server ? Render injects PORT automatically
server.port=${PORT:8080}

# PostgreSQL
# In Render dashboard, add these 4 env vars
# by splitting your Internal Database URL:
# postgresql://USER:PASSWORD@HOST/DBNAME
spring.datasource.url=jdbc:postgresql://${DB_HOST}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Disable H2 console in prod
spring.h2.console.enabled=false

# Admin credentials ? set these in Render environment variables
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}