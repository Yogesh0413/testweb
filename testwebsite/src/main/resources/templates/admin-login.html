<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Login — The Grand Horizon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root{
            --gold:#c9a96e;--gold-light:#e8d5b0;--gold-dim:rgba(201,169,110,0.12);
            --gold-border:rgba(201,169,110,0.25);--bg:#07080a;--surface:#0d0f11;
            --card:#121416;--border:rgba(255,255,255,0.06);--text:#f0ebe3;
            --muted:#6b6760;--dim:#333;
            --display:'Playfair Display',Georgia,serif;--body:'DM Sans',sans-serif;
            --ease:cubic-bezier(0.25,0.46,0.45,0.94);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html,body{height:100%;}
        body{
            background:var(--bg);color:var(--text);font-family:var(--body);font-weight:300;
            line-height:1.7;-webkit-font-smoothing:antialiased;cursor:none;
            display:flex;align-items:center;justify-content:center;min-height:100vh;
            background-image:
                radial-gradient(ellipse at 20% 50%,rgba(201,169,110,0.04) 0%,transparent 55%),
                radial-gradient(ellipse at 80% 20%,rgba(201,169,110,0.03) 0%,transparent 45%);
        }
        a{color:inherit;text-decoration:none;}
        h1,h2,h3{font-family:var(--display);font-weight:400;line-height:1.15;}
        p{color:var(--muted);font-size:0.88rem;line-height:1.8;}

        /* Cursor */
        #cursorDot,#cursorRing{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;}
        .cursor__dot{width:8px;height:8px;background:var(--gold);border-radius:50%;transform:translate(-50%,-50%);}
        .cursor__ring{width:36px;height:36px;border:1px solid rgba(201,169,110,0.4);border-radius:50%;transform:translate(-50%,-50%);transition:width 0.3s,height 0.3s;}

        /* Animated background lines */
        .bg-lines{position:fixed;inset:0;pointer-events:none;overflow:hidden;opacity:0.04;}
        .bg-lines span{position:absolute;width:1px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);animation:lineFloat linear infinite;}
        .bg-lines span:nth-child(1){left:15%;height:60%;animation-duration:8s;animation-delay:0s;}
        .bg-lines span:nth-child(2){left:35%;height:40%;animation-duration:11s;animation-delay:2s;}
        .bg-lines span:nth-child(3){left:55%;height:70%;animation-duration:9s;animation-delay:1s;}
        .bg-lines span:nth-child(4){left:75%;height:50%;animation-duration:13s;animation-delay:3s;}
        .bg-lines span:nth-child(5){left:90%;height:45%;animation-duration:10s;animation-delay:0.5s;}
        @keyframes lineFloat{0%{top:-100%;opacity:0;}20%{opacity:1;}80%{opacity:1;}100%{top:200%;opacity:0;}}

        /* Card */
        .login-card{
            width:100%;max-width:440px;padding:0 1.5rem;
            animation:fadeUp 0.8s var(--ease) both;
        }
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

        /* Brand */
        .login-brand{text-align:center;margin-bottom:3rem;}
        .login-brand__mark{
            width:60px;height:60px;border:1px solid var(--gold-border);border-radius:50%;
            display:inline-flex;align-items:center;justify-content:center;
            font-size:1.3rem;color:var(--gold);margin-bottom:1.2rem;
            position:relative;
        }
        .login-brand__mark::before{
            content:'';position:absolute;inset:-6px;border:1px solid rgba(201,169,110,0.12);
            border-radius:50%;animation:ringPulse 3s ease infinite;
        }
        @keyframes ringPulse{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(1.3);}}
        .login-brand__name{font-family:var(--display);font-size:1.5rem;color:var(--text);margin-bottom:0.3rem;}
        .login-brand__sub{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);}

        /* Form box */
        .login-box{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:2.8rem;}

        .login-box h2{font-size:1.6rem;margin-bottom:0.4rem;}
        .login-box>p{font-size:0.82rem;margin-bottom:2rem;color:var(--muted);}

        /* Error / Logout messages */
        .login-alert{padding:0.9rem 1.1rem;border-radius:2px;font-size:0.82rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:0.6rem;}
        .login-alert--error{background:rgba(192,96,96,0.1);border:1px solid rgba(192,96,96,0.25);color:#e89090;}
        .login-alert--success{background:rgba(92,173,120,0.1);border:1px solid rgba(92,173,120,0.25);color:#5cad78;}

        /* Fields */
        .form-field{display:flex;flex-direction:column;gap:0.45rem;margin-bottom:1.4rem;}
        .form-field label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);font-weight:500;}
        .form-field input{
            background:rgba(255,255,255,0.03);
            border:1px solid var(--border);
            border-radius:2px;
            color:var(--text);
            font-family:var(--body);
            font-size:0.95rem;
            font-weight:300;
            padding:0.85rem 1rem;
            outline:none;
            transition:border-color 0.3s,background 0.3s;
            width:100%;
        }
        .form-field input::placeholder{color:var(--dim);}
        .form-field input:focus{border-color:var(--gold);background:rgba(201,169,110,0.04);}

        /* Show/hide password */
        .form-field__wrap{position:relative;}
        .form-field__wrap input{padding-right:3rem;}
        .toggle-pw{
            position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);
            background:none;border:none;color:var(--muted);cursor:pointer;
            font-size:0.8rem;padding:0.2rem;transition:color 0.2s;
        }
        .toggle-pw:hover{color:var(--gold);}

        /* Submit */
        .login-submit{
            width:100%;padding:1rem;background:var(--gold);color:#08090a;
            font-family:var(--body);font-size:0.78rem;font-weight:500;
            letter-spacing:0.16em;text-transform:uppercase;border:none;
            border-radius:2px;cursor:pointer;transition:all 0.3s var(--ease);
            margin-top:0.5rem;position:relative;overflow:hidden;
        }
        .login-submit:hover{background:var(--gold-light);transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,169,110,0.25);}
        .login-submit:active{transform:translateY(0);}

        /* Footer link */
        .login-footer{text-align:center;margin-top:1.8rem;}
        .login-footer a{font-size:0.78rem;color:var(--muted);transition:color 0.2s;}
        .login-footer a:hover{color:var(--gold);}
        .login-footer a::before{content:'← ';}

        ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--dim);}
    </style>
</head>
<body>

<div id="cursorDot"><div class="cursor__dot"></div></div>
<div id="cursorRing"><div class="cursor__ring"></div></div>

<!-- Ambient background lines -->
<div class="bg-lines">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="login-card">

    <!-- Brand -->
    <div class="login-brand">
        <div class="login-brand__mark">✦</div>
        <div class="login-brand__name">The Grand Horizon</div>
        <div class="login-brand__sub">Admin Portal</div>
    </div>

    <!-- Login Box -->
    <div class="login-box">
        <h2>Welcome <em style="font-style:italic;color:var(--gold);">Back</em></h2>
        <p>Sign in with your admin credentials to access the dashboard.</p>

        <!-- Error message -->
        <div class="login-alert login-alert--error" th:if="${param.error}">
            ✕ &nbsp;Incorrect username or password. Please try again.
        </div>

        <!-- Logout message -->
        <div class="login-alert login-alert--success" th:if="${param.logout}">
            ✓ &nbsp;You have been signed out successfully.
        </div>

        <!-- Form — Spring Security handles POST /admin/login -->
        <form th:action="@{/admin/login}" method="post">

            <!-- CSRF token (Spring Security requires this) -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       placeholder="Enter your username"
                       autocomplete="username"
                       autofocus required/>
            </div>

            <div class="form-field">
                <label for="password">Password</label>
                <div class="form-field__wrap">
                    <input type="password" id="password" name="password"
                           placeholder="Enter your password"
                           autocomplete="current-password"
                           required/>
                    <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
                        👁
                    </button>
                </div>
            </div>

            <button type="submit" class="login-submit">Sign In to Dashboard →</button>
        </form>
    </div>

    <!-- Back to site -->
    <div class="login-footer">
        <a th:href="@{/}">Back to website</a>
    </div>

</div>

<script>
    // Cursor
    const dot=document.getElementById('cursorDot'),ring=document.getElementById('cursorRing');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
    (function anim(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim);})();

    // Toggle password visibility
    const togglePw = document.getElementById('togglePw');
    const pwInput  = document.getElementById('password');
    togglePw?.addEventListener('click', () => {
        const isPassword = pwInput.type === 'password';
        pwInput.type = isPassword ? 'text' : 'password';
        togglePw.textContent = isPassword ? '🙈' : '👁';
    });
</script>
</body>
</html>
